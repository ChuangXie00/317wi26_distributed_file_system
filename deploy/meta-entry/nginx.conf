events {}

http {
    # 中文：proxy_pass 使用变量时需要 resolver，Docker 内 DNS 走 127.0.0.11。
    resolver 127.0.0.11 valid=1s ipv6=off;

    server {
        listen 8000;

        # 中文：默认目标，控制器会通过 include 文件动态覆盖。
        set $meta_upstream http://meta-01:8000;
        set $meta_leader_id meta-01;
        include /etc/nginx/conf.d/meta_upstream.conf;

        # 中文：entry 调试出口，展示当前实际转发目标与探测状态。
        location = /debug/entry {
            alias /var/lib/meta-entry/debug/entry_status.json;
            default_type application/json;
            add_header Cache-Control "no-store";
        }

        location / {
            proxy_pass $meta_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Entry-Target $meta_leader_id;
        }
    }
}
