services:
  # Postgres DB (01P3.1)
  postgres:
    image: postgres:16-alpine
    container_name: dfs-postgres
    environment:
      - POSTGRES_DB=dfs_meta
      - POSTGRES_USER=dfs_user
      - POSTGRES_PASSWORD=dfs_pass
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dfs_user -d dfs_meta"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - dfs-net


  # entry for host access: localhost:8000 -> meta-entry -> meta-leader
  meta-entry:
    image: nginx:alpine
    container_name: meta-entry
    ports:
      - "8000:8000"
    volumes: 
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - meta-01
    networks:
      - dfs-net

  meta-01:
    build: ../services/meta
    container_name: meta-01
    environment:
      # 0.1p5.0：运行时角色 bootstrap，后续由 election/coordinator 动态收敛。
      - META_NODE_ID=meta-01
      - META_ROLE=leader
      # 0.1p5.0：统一选主配置（本阶段仅支持 bully，非 bully 启动即失败）。
      - LEADER_ELECTION_MODE=bully
      - META_CLUSTER_NODES=meta-01,meta-02
      - META_INTERNAL_PORT=8000
      - REPLICATION_FACTOR=2
      - STORAGE_NODES=storage-01, storage-02, storage-03
      - ENABLE_STORAGE_HEALTHCHECK=1
      - STORAGE_PORT=9009
      - METADATA_FILE=metadata.json
      - DATA_DIR=/data

      # 0.1p03 heartbeat and membership timeout settings
      - HEARTBEAT_INTERVAL_SEC=3
      - HEARTBEAT_TIMEOUT_SEC=9
      - MEMBERSHIP_SWEEP_INTERVAL_SEC=1

      # 0.1p04 历史兼容：leader -> follower 同步参数（p5 主路径改为 cluster peers）
      - META_FOLLOWER_URLS=http://meta-02:8000
      - META_INTERNAL_TIMEOUT_SEC=2
      - META_HEARTBEAT_INTERVAL_SEC=3
      - META_SYNC_INTERVAL_SEC=5
      - META_LEADER_HEARTBEAT_TIMEOUT_SEC=9

      # 0.1p3.1 postgres settings
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=dfs_meta
      - PG_USER=dfs_user
      - PG_PASSWORD=dfs_pass
      - PG_SSLMODE=disable
      - PG_CONNECT_TIMEOUT_SEC=5
      - PG_STATEMENT_TIMEOUT_MS=8000
      - DEFAULT_NAMESPACE=default
    volumes:
      - ../data/meta:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dfs-net

  # 0.1p5.0：meta-02 可在 leader 超时后触发 Bully takeover。
  meta-02:
    build: ../services/meta
    container_name: meta-02
    environment:
      - META_NODE_ID=meta-02
      - META_ROLE=follower
      # 0.1p5.0：统一选主配置（本阶段仅支持 bully，非 bully 启动即失败）。
      - LEADER_ELECTION_MODE=bully
      - META_CLUSTER_NODES=meta-01,meta-02
      - META_INTERNAL_PORT=8000
      - REPLICATION_FACTOR=2
      - STORAGE_NODES=storage-01,storage-02,storage-03
      - ENABLE_STORAGE_HEALTHCHECK=1
      - STORAGE_PORT=9009
      - METADATA_FILE=metadata.json
      - DATA_DIR=/data

      # 0.1p03 heartbeat and membership timeout settings
      - HEARTBEAT_INTERVAL_SEC=3
      - HEARTBEAT_TIMEOUT_SEC=9
      - MEMBERSHIP_SWEEP_INTERVAL_SEC=1

      # 0.1p04 历史兼容：follower 观测 leader 地址（p5 主路径改为 cluster peers）
      - META_LEADER_URL=http://meta-01:8000
      - META_INTERNAL_TIMEOUT_SEC=2
      - META_HEARTBEAT_INTERVAL_SEC=3
      - META_SYNC_INTERVAL_SEC=5
      - META_LEADER_HEARTBEAT_TIMEOUT_SEC=9

      # 0.1p3.1 postgres settings
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=dfs_meta
      - PG_USER=dfs_user
      - PG_PASSWORD=dfs_pass
      - PG_SSLMODE=disable
      - PG_CONNECT_TIMEOUT_SEC=5
      - PG_STATEMENT_TIMEOUT_MS=8000
      - DEFAULT_NAMESPACE=default
    volumes:
      - ../data/meta-follower:/data
    # 0.1p04 暴露8002用于本地测试验证warm standby机制
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dfs-net

  storage-01:
    build: ../services/storage
    container_name: storage-01
    environment:
      - NODE_ID=storage-01
      - DATA_DIR=/data
      # 0.1p03 storage send heartbeat to meta-entry every x seconds
      - META_ENTRY_BASE_URL=http://meta-entry:8000
      - STORAGE_HEARTBEAT_INTERVAL_SEC=3
      - STORAGE_HEARTBEAT_TIMEOUT_SEC=2
    volumes:
      - ../data/storage-01:/data
    ports:
      - "9009:9009" # <host:container>map storage-01 port to host for client access
    depends_on:
      - meta-entry
    networks:
      - dfs-net

  storage-02:
    build: ../services/storage
    container_name: storage-02
    environment:
      - NODE_ID=storage-02
      - DATA_DIR=/data
      - META_ENTRY_BASE_URL=http://meta-entry:8000
      - STORAGE_HEARTBEAT_INTERVAL_SEC=3
      - STORAGE_HEARTBEAT_TIMEOUT_SEC=2
    volumes:
      - ../data/storage-02:/data
    ports:
      - "9010:9009"
    depends_on:
      - meta-entry
    networks:
      - dfs-net

  storage-03:
    build: ../services/storage
    container_name: storage-03
    environment:
      - NODE_ID=storage-03
      - DATA_DIR=/data
      - META_ENTRY_BASE_URL=http://meta-entry:8000
      - STORAGE_HEARTBEAT_INTERVAL_SEC=3
      - STORAGE_HEARTBEAT_TIMEOUT_SEC=2
    volumes:
      - ../data/storage-03:/data
    ports:
      - "9011:9009"
    depends_on:
      - meta-entry
    networks:
      - dfs-net

networks:
  dfs-net:
    driver: bridge
